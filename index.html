<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Перенаправление...</title>
    <meta http-equiv="refresh" content="3; URL=https://bereznyak72.github.io/web-site/">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f5f1e6;
            color: #5a3e36;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(135deg, #f5f1e6 0%, #e8d9c5 100%);
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            background: rgba(255, 253, 245, 0.9);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(90, 62, 54, 0.1);
            border: 1px solid rgba(90, 62, 54, 0.1);
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            color: #5a3e36;
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .loader {
            width: 100%;
            height: 6px;
            background: #e8d9c5;
            border-radius: 3px;
            margin: 1.5rem 0;
            overflow: hidden;
        }

        .loader-bar {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #8b5a2b, #a67c52);
            animation: loading 3s linear forwards;
            border-radius: 3px;
        }

        .btn {
            display: inline-block;
            padding: 0.8rem 1.8rem;
            background: linear-gradient(90deg, #8b5a2b, #a67c52);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 90, 43, 0.3);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(139, 90, 43, 0.4);
            background: linear-gradient(90deg, #a67c52, #8b5a2b);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes loading {
            0% { width: 0; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Добро пожаловать!</h1>
        <p>Вы будете автоматически перенаправлены на мой сайт через несколько секунд.</p>
        
        <div class="loader">
            <div class="loader-bar"></div>
        </div>
        
        <p>Если перенаправление не сработало, нажмите кнопку ниже:</p>
        <a href="https://bereznyak72.github.io/web-site/" class="btn">Перейти на сайт</a>
    </div>
</body>
</html>
